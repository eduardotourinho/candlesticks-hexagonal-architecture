<line x1="32"  y1="790" x2="90"  y2="790" stroke="rgba(0,0,0,0.22)" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="98"  y="790" dominant-baseline="central">Subsystem boundary</text>
<line x1="270" y1="790" x2="328" y2="790" stroke="rgba(0,0,0,0.38)" stroke-width="1.2" stroke-dasharray="6 3"/>
