<rect x="32"  y="752" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="ts" x="52"  y="759" dominant-baseline="central">Actors</text>
<rect x="112" y="752" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="ts" x="132" y="759" dominant-baseline="central">Adapters</text>
<rect x="210" y="752" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="ts" x="230" y="759" dominant-baseline="central">Ports</text>
<rect x="284" y="752" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text class="ts" x="304" y="759" dominant-baseline="central">Services</text>
<rect x="374" y="752" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
