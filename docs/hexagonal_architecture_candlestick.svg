<svg width="1200" height="840" viewBox="0 0 1200 840" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .th  { font-size: 13px; font-weight: 500; fill: #1a1a18; }
    .ts  { font-size: 11px; font-weight: 400; fill: #5f5e5a; }
    .tb  { fill: #0C447C; } .tb2 { fill: #185FA5; }
    .tt  { fill: #085041; }
    .tp  { fill: #3C3489; }
    .tg  { fill: #444441; }
    .tc  { fill: #712B13; } .tc2 { fill: #993C1D; }
    .edge { fill: none; stroke: rgba(0,0,0,0.28); stroke-width: 1; }
    .dash { stroke-dasharray: 5 3; fill: none; stroke: rgba(0,0,0,0.22); stroke-width: 0.5; }
    .appbdr { fill: none; stroke: rgba(0,0,0,0.38); stroke-width: 1.2; stroke-dasharray: 6 3; }
  </style>
</defs>

<rect width="1200" height="840" fill="#ffffff"/>

<!-- Application boundary -->
<rect class="appbdr" x="528" y="18" width="664" height="660" rx="14"/>
<text class="th" x="860" y="38" text-anchor="middle" dominant-baseline="central">Application</text>

<!-- Actors -->
<rect x="20" y="96" width="96" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th tb" x="68" y="117" text-anchor="middle" dominant-baseline="central">User</text>
<text class="ts tb2" x="68" y="136" text-anchor="middle" dominant-baseline="central">REST</text>

<rect x="20" y="356" width="96" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th tb" x="68" y="374" text-anchor="middle" dominant-baseline="central">Partner</text>
<text class="ts tb2" x="68" y="393" text-anchor="middle" dominant-baseline="central">WebSocket</text>

<!-- REST adapter (in) -->
<rect class="dash" x="266" y="66" width="244" height="204" rx="10"/>
<text class="ts" x="388" y="82" text-anchor="middle" dominant-baseline="central">REST adapter (in)</text>
<rect x="278" y="94"  width="220" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="388" y="114" text-anchor="middle" dominant-baseline="central">CandlestickController</text>
<rect x="278" y="146" width="220" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="388" y="166" text-anchor="middle" dominant-baseline="central">ResponseMapper</text>
<rect x="278" y="198" width="220" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="388" y="218" text-anchor="middle" dominant-baseline="central">GlobalExceptionHandler</text>

<!-- WebSocket adapter (in) -->
<rect class="dash" x="266" y="316" width="244" height="204" rx="10"/>
<text class="ts" x="388" y="332" text-anchor="middle" dominant-baseline="central">WebSocket adapter (in)</text>
<rect x="278" y="348" width="220" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="388" y="368" text-anchor="middle" dominant-baseline="central">InstrumentStreamHandler</text>
<rect x="278" y="400" width="220" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th tt" x="388" y="420" text-anchor="middle" dominant-baseline="central">QuotesStreamHandler</text>

<!-- Ports (in) -->
<rect class="dash" x="540" y="50" width="220" height="630" rx="10"/>
