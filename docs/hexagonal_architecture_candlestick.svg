<rect x="790" y="280" width="172" height="40" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th tg" x="876" y="300" text-anchor="middle" dominant-baseline="central">CandlestickFactory</text>
<rect x="790" y="370" width="172" height="40" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th tg" x="876" y="390" text-anchor="middle" dominant-baseline="central">InstrumentManager</text>

<!-- Ports (out) -->
<rect class="dash" x="992" y="50" width="200" height="630" rx="10"/>
<text class="ts" x="1092" y="66" text-anchor="middle" dominant-baseline="central">Ports (out)</text>
<rect x="1004" y="88"  width="176" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th tp" x="1092" y="108" text-anchor="middle" dominant-baseline="central">QuoteFinderPort</text>
<rect x="1004" y="344" width="176" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th tp" x="1092" y="364" text-anchor="middle" dominant-baseline="central">InstrumentManagerPort</text>
<rect x="1004" y="400" width="176" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th tp" x="1092" y="420" text-anchor="middle" dominant-baseline="central">QuoteManagerPort</text>

<!-- Storage adapter (out) -->
<rect class="dash" x="928" y="716" width="264" height="96" rx="10"/>
<text class="ts" x="1060" y="732" text-anchor="middle" dominant-baseline="central">Storage adapter (out)</text>
<rect x="940" y="744" width="224" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th tc" x="1052" y="764" text-anchor="middle" dominant-baseline="central">InstrumentStorageManager</text>
<rect x="940" y="796" width="80" height="32" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th tc" x="980" y="807" text-anchor="middle" dominant-baseline="central">H2</text>
<text class="ts tc2" x="980" y="821" text-anchor="middle" dominant-baseline="central">Embedded DB</text>

<!-- ARROWS -->

<!-- User → Controller -->
<path class="edge" d="M116 110 L191 110 L191 94 L276 94" marker-end="url(#arr)"/>
<text class="ts" x="191" y="101" text-anchor="middle" dominant-baseline="central">GET /candlesticks?isin=</text>

<!-- Partner → InstrumentStreamHandler -->
<path class="edge" d="M116 368 L276 368" marker-end="url(#arr)"/>
<text class="ts" x="196" y="359" text-anchor="middle" dominant-baseline="central">ws /instruments</text>

<!-- Partner → QuotesStreamHandler -->
<path class="edge" d="M116 382 L180 382 L180 420 L276 420" marker-end="url(#arr)"/>
<text class="ts" x="196" y="432" text-anchor="middle" dominant-baseline="central">ws /quotes</text>

<!-- Controller → FindCandlesticksUseCase -->
<path class="edge" d="M498 114 L550 108" marker-end="url(#arr)"/>

<!-- InstrumentStreamHandler → ManageInstrumentUseCase -->
<path class="edge" d="M498 368 L550 364" marker-end="url(#arr)"/>

<!-- QuotesStreamHandler → ManageQuoteUseCase -->
<path class="edge" d="M498 420 L550 420" marker-end="url(#arr)"/>

<!-- FindCandlesticksUseCase → CandlestickService -->
<path class="edge" d="M748 108 L788 108" marker-end="url(#arr)"/>

<!-- CandlestickService → CandlestickFactory -->
<path class="edge" d="M876 128 L876 278" marker-end="url(#arr)"/>

<!-- CandlestickService → QuoteFinderPort -->
<path class="edge" d="M962 108 L1002 108" marker-end="url(#arr)"/>

<!-- ManageInstrumentUseCase → InstrumentManager -->
<path class="edge" d="M748 364 L788 380" marker-end="url(#arr)"/>

<!-- ManageQuoteUseCase → InstrumentManager -->
<path class="edge" d="M748 420 L788 393" marker-end="url(#arr)"/>

<!-- InstrumentManager → InstrumentManagerPort -->
<path class="edge" d="M962 374 L1002 364" marker-end="url(#arr)"/>

<!-- InstrumentManager → QuoteManagerPort -->
<path class="edge" d="M962 390 L1002 410" marker-end="url(#arr)"/>

<!-- Ports-out → Storage -->
<path class="edge" d="M1092 128 L1092 680 L1052 742" marker-end="url(#arr)"/>
<path class="edge" d="M1170 364 L1170 700 L1092 700 L1052 742" marker-end="url(#arr)"/>
<path class="edge" d="M1170 420 L1170 700"/>

<!-- InstrumentStorageManager → H2 -->
<path class="edge" d="M980 784 L980 794" marker-end="url(#arr)"/>

<!-- LEGEND -->
<rect x="20" y="716" width="500" height="96" rx="10" fill="#f5f5f0" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
